plan_id: gsd-integration
objective: |
  将 GSD (get-shit-done) 的项目管理骨架与 superpowers4copilot 的专业代理层整合，
  形成「GSD 负责项目生命周期 + 我们负责专业代理调度」的混合架构。
  GSD 作为只读上游参考，所有适配在我们这边完成。
created_at: "2026-04-15"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 18
  risk_score: medium

tldr: |
  分 5 个 Wave 完成整合：
  Wave 1: 基础设施层——GSD 检测工具、状态读取适配器、安装脚本更新（4 任务并行）
  Wave 2: 代理适配层——gem-orchestrator 感知 GSD、完成标记协议、GSD 桥接技能（3 任务并行）
  Wave 3: 专业代理路由——GSD 执行阶段中调度专业代理、门控修订循环（2 任务并行）
  Wave 4: 韧性与恢复——会话恢复优先级链、上下文消耗感知（2 任务并行）
  Wave 5: 文档与验证——集成指南、E2E 验收测试（2 任务并行）
  总计 13 个任务，预估总工时 35-50 分钟。

open_questions:
  - "GSD 的 npx get-shit-done-cc --copilot 安装路径是否稳定？是否需要版本锁定？"
  - "GSD 的 .planning/ 文件结构在未来版本中是否有 breaking change 的风险？"
  - "是否需要支持同一个项目中的多 workspace（GSD_WORKSTREAM 模式）？"

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "GSD 更新破坏 .planning/ 文件格式，导致我们的状态读取适配器失效"
      likelihood: medium
      impact: high
      mitigation: "适配器使用防御性解析（字段缺失时优雅降级），不依赖 GSD 内部实现细节，只读取公共约定的文件格式"
    - scenario: "two-system 安装增加用户配置负担，用户弃用"
      likelihood: medium
      impact: medium
      mitigation: "安装脚本自动检测 GSD 存在性并提示整合选项；无 GSD 时系统完全独立工作"
    - scenario: "orchestrator 上下文窗口因同时加载 GSD 状态和自身计划而过载"
      likelihood: medium
      impact: high
      mitigation: "GSD 状态读取严格限制在 frontmatter + 摘要级别（<50 行），绝不加载完整 .planning/ 文件"
    - scenario: "GSD 的 slash command 与我们的 slash command 命名冲突"
      likelihood: low
      impact: low
      mitigation: "GSD 用 /gsd-* 前缀，我们用 /sp-* 前缀，天然隔离"
  assumptions:
    - "GSD 已通过 npx get-shit-done-cc --copilot 安装到 VS Code prompts 目录"
    - "GSD 的 .planning/ 目录结构遵循研究中记录的约定（STATE.md, ROADMAP.md, config.json 等）"
    - "用户项目中的 .planning/ 目录由 GSD 独占管理，我们只读不写"
    - "VS Code Copilot 的代理系统允许多个 agent 共存且可通过 @ 前缀区分"
    - "install.sh 和 install.ps1 必须同步更新"

implementation_specification:
  code_structure: |
    新增一个 skills/gsd-bridge/ 技能目录，包含 GSD 检测、状态读取、代理路由逻辑。
    修改 gem-orchestrator 的 Phase Detection 部分，增加 GSD 感知分支。
    修改安装脚本，增加 GSD 检测提示和可选集成步骤。
    所有 GSD 交互通过防御性适配器层完成，不直接依赖 GSD 内部实现。

  affected_areas:
    - "agents/gem-orchestrator.agent.md — 核心编排器，增加 GSD 感知"
    - "skills/gsd-bridge/ — 新技能目录，GSD 适配层"
    - "install.sh, install.ps1 — 安装脚本增加 GSD 检测"
    - "agents/global.instructions.md — 全局指令增加 GSD 上下文约定"
    - "prompts/sp-plan-exec.prompt.md — 执行计划时感知 GSD 状态"
    - "docs/ — 集成文档"

  component_details:
    - component: "skills/gsd-bridge/SKILL.md"
      responsibility: "GSD 桥接技能主文件：检测逻辑、状态读取协议、代理路由规则"
      interfaces:
        - "GSD 检测：检查 .planning/ 目录和 GSD 命令可用性"
        - "状态读取：解析 STATE.md frontmatter，提取当前阶段/计划/状态"
        - "路由建议：根据 GSD 阶段类型映射到可调度的专业代理"

    - component: "skills/gsd-bridge/gsd-detector.md"
      responsibility: "GSD 存在性检测和版本信息获取"
      interfaces:
        - "detect_gsd(): 返回 {installed: bool, version: string, planning_dir: string}"

    - component: "skills/gsd-bridge/state-reader.md"
      responsibility: "只读解析 GSD .planning/ 状态文件"
      interfaces:
        - "read_state(): 返回当前阶段、计划、任务状态的结构化摘要"
        - "read_phase_context(): 返回当前阶段的上下文级摘要"

    - component: "skills/gsd-bridge/agent-router.md"
      responsibility: "GSD 阶段/任务类型到专业代理的映射表"
      interfaces:
        - "route_task(gsd_task_type): 返回推荐的专业代理和调度参数"

    - component: "agents/gem-orchestrator.agent.md (修改)"
      responsibility: "增加 GSD 感知的 Phase Detection 分支和状态同步"
      interfaces:
        - "GSD Mode Detection: 检测 .planning/ 存在性，进入 GSD 协作模式"
        - "GSD State Sync: 从 .planning/STATE.md 读取当前位置"

  dependencies:
    - component: "gsd-bridge 技能"
      relationship: "被 gem-orchestrator 在 Phase Detection 阶段加载和调用"
    - component: "state-reader"
      relationship: "被 agent-router 和 orchestrator 用于判断当前 GSD 阶段"
    - component: "agent-router"
      relationship: "被 orchestrator 用于在 GSD 执行阶段调度专业代理"
    - component: "gsd-detector"
      relationship: "被安装脚本和 orchestrator 用于检测 GSD 是否可用"

  integration_points:
    - "gem-orchestrator Phase Detection → GSD .planning/STATE.md 读取"
    - "gem-orchestrator Execution Loop → GSD 执行阶段任务的专业代理路由"
    - "install.sh/install.ps1 → GSD 存在性检测和提示"
    - "sp-plan-exec prompt → GSD 状态感知"
    - "子代理完成标记 → 统一的 completion marker 协议"

