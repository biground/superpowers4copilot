         - 提取当前 GSD 阶段类型（discuss/research/plan/execute/verify）
      2. 在 Phase Detection 逻辑中增加 GSD 分支：
         - IF gsd_mode AND GSD 在 execute 阶段 AND 用户请求专业审查：调度专业代理
         - IF gsd_mode AND GSD 在 plan 阶段：提供我们的 gem-planner 作为可选增强
         - IF gsd_mode AND 用户直接 @gem-orchestrator：正常走我们的工作流，同时感知 GSD 状态
      3. 在 Status Summary Format 中增加 GSD 状态行：
         - "GSD: Phase {n}/{total} | {phase_name} | {status}" （仅 gsd_mode=true 时显示）
      4. 在 Knowledge Sources 中增加一条：
         - "GSD 状态: .planning/STATE.md（如果存在）用于项目位置感知"
      5. 保持所有非 GSD 路径不变——gsd_mode=false 时行为与当前完全一致
    wave: 2
    agent: gem-implementer
    prototype: false
