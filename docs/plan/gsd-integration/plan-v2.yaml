plan_id: gsd-integration-v2
objective: |
  以 GSD 为主体，将 superpowers4copilot 的精华内容注入 GSD，形成统一的项目管理 + 专业代理系统。
  方向完全逆转：GSD 仓库（/Users/biground/.copilot/get-shit-done/）为工作仓库，
  SP 仓库（/Users/biground/.copilot/superpowers4copilot/）为源材料参考。
created_at: "2026-04-15"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 28
  risk_score: medium

tldr: |
  分 5 个 Wave、21 个任务完成整合。所有工作在 GSD 仓库中执行。

  Wave 1（3 任务并行）: 基础准备——格式转换参考文档、复制 skills/ 到 GSD、分析 install.js Copilot 集成逻辑
  Wave 2（4 任务并行）: 技能适配 + 新 Agent 添加——适配 skills/ 工具引用、添加 gem-orchestrator + narrative-writer + critic
  Wave 3（7 任务并行）: GSD Agent 功能注入——向 7 类 GSD agent 注入 SP 特色能力
  Wave 4（4 任务并行）: 命令集成——修改现有命令引用 skills + 创建 SP 独有命令
  Wave 5（3 任务）: 安装集成 + 文档 + 验证

  关键发现：GSD install.js 已内置 --copilot 模式，自动做 Claude Code→Copilot 工具名映射和路径转换。
  因此所有 agent/command/skill 文件用 Claude Code 格式编写即可，安装时自动适配。

open_questions:
  - "GSD install.js 的 claudeToCopilotTools 映射是否覆盖了 SP agents 使用的所有工具？"
  - "skills/ 目录是否需要加入 package.json 的 files 字段才能随 npm 包发布？"
  - "gem-orchestrator 在 Claude Code 环境下是否应该作为 agent 还是作为 workflow？"

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "SP agent 格式转换丢失关键逻辑——VS Code 特有的 EXTREMELY-IMPORTANT sub-agent 约束块在 Claude Code 格式中无对应物"
      likelihood: medium
      impact: high
      mitigation: "格式转换参考文档（T01）中明确列出每个 VS Code 特有块的 Claude Code 等价处理方式；XML <role> 块中可保留约束语义"
    - scenario: "skills/ 中的 VS Code 工具引用（vscode_askQuestions 等）在 Claude Code 环境下不可用，导致 skill 执行失败"
      likelihood: high
      impact: high
      mitigation: "T04 专门适配 skills，建立工具名映射表（vscode_askQuestions→AskUserQuestion），使用条件检测逻辑"
    - scenario: "注入内容过多导致 GSD agent 文件膨胀，超出 Claude Code 的 agent 加载预算"
      likelihood: medium
      impact: medium
      mitigation: "每个注入严格控制在 30-50 行以内；详细内容引用 skills/ 文件而非内联；保持 GSD 原有结构不变"
    - scenario: "gem-orchestrator 在 Claude Code 中角色定位冲突——Claude Code 用命令编排，不需要独立 orchestrator agent"
      likelihood: medium
      impact: medium
      mitigation: "gem-orchestrator 在 Claude Code 中定位为 workflow advisor（顾问角色），主编排由 GSD commands 处理；在 Copilot 中保持核心路由器定位"
    - scenario: "新增命令与 GSD 现有命令命名冲突或语义重叠"
      likelihood: low
      impact: medium
      mitigation: "SP 独有命令统一使用 sp- 前缀（gsd:sp-brainstorm 等），与 GSD 原有命令天然隔离"
  assumptions:
    - "工作仓库为 /Users/biground/.copilot/get-shit-done/（用户的 GSD fork）"
    - "源材料仓库为 /Users/biground/.copilot/superpowers4copilot/"
    - "GSD 的 bin/lib/*.cjs、sdk/、hooks/ 等核心 CLI 文件不修改"
    - "修改范围：agents/*.md、commands/gsd/*.md、新增 skills/ 目录、package.json files 字段"
    - "GSD install.js 的 --copilot 模式会自动做工具名映射和路径转换"
    - "所有新文件使用 Claude Code 格式（GSD 原生格式），Copilot 适配由 install.js 处理"
    - "install.sh 和 install.ps1 同步更新规则仅适用于 SP 仓库，GSD 仓库不适用"

implementation_specification:
  code_structure: |
    以 GSD 仓库为基础，做三类操作：
    1. 新增：skills/ 目录（从 SP 复制并适配）+ 3 个新 agent 文件
    2. 修改：8 个 GSD agent 文件（注入 SP 特色能力）+ 4 个 GSD command 文件（引用 skills）
    3. 创建：6-8 个新 GSD command 文件（SP 独有功能的命令入口）
    所有文件统一使用 GSD 的 Claude Code 格式（YAML frontmatter + XML 结构化内容）。

  affected_areas:
    - "skills/ — 新增目录，从 SP 复制全部技能并适配工具引用"
    - "agents/ — 修改 8 个现有 agent + 新增 3 个 agent"
    - "commands/gsd/ — 修改 4 个现有命令 + 新增 6-8 个命令"
    - "package.json — files 字段增加 skills"

  component_details:
    - component: "skills/"
      responsibility: "专业技能库——brainstorming、TDD、systematic-debugging、writing-plans、executing-plans 等"
      interfaces:
        - "每个 skill 有 SKILL.md 入口文件，agent/command 通过读取 SKILL.md 加载技能"
        - "技能引用路径：~/.claude/get-shit-done/skills/<name>/SKILL.md（全局安装）或 skills/<name>/SKILL.md（本地安装）"
    - component: "agents/gem-orchestrator.md"
      responsibility: "多 agent 编排核心——阶段检测、agent 路由、结果综合。Claude Code 中为 workflow advisor，Copilot 中为主路由器"
      interfaces:
        - "可调度所有 GSD agent + SP 独有 agent"
        - "技能触发：根据任务类型加载对应 skill"
    - component: "agents/gem-narrative-writer.md"
      responsibility: "Obsidian 叙事风格技术笔记写作——Scene→Conflict→Exploration→Discovery→Summary 叙事弧"
      interfaces:
        - "由 gsd-doc-writer 的 narrative 模式触发，或独立使用"
        - "输出 Obsidian 兼容 Markdown（wikilinks, tags, callouts）"
    - component: "agents/gsd-critic.md"
      responsibility: "广范围批判性审查——覆盖 plan + code + architecture + design，融合 plan-checker 的目标反向验证 + gem-critic 的假设挑战"
      interfaces:
        - "可被命令或 orchestrator 独立触发"
        - "输入：任何需要批判性审查的 artifact（计划、代码、架构设计）"

  dependencies:
    - component: "skills/ ↔ agents/"
      relationship: "agents 通过 <required_reading> 或 project_context 中的 skill 加载指令引用 skills/"
    - component: "skills/ ↔ commands/"
      relationship: "commands 在 <execution_context> 中引用 skill 文件路径"
    - component: "agents/ ↔ commands/"
      relationship: "commands 的 agent: 字段指定由哪个 agent 执行"

  integration_points:
    - "GSD install.js --copilot 模式：自动将 Claude Code 格式转换为 Copilot 格式"
    - "GSD 的 project_context 约定：agent 启动时检查 .claude/skills/ 或 .agents/skills/"
    - "GSD 的 <required_reading> 机制：用于指定 agent 必读的 skill 文件"

